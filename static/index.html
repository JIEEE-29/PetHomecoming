<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宠物归家系统</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="home">
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">宠物归家系统</a>
      <nav class="site-nav">
        <a href="/">首页</a>
        <a href="/auth">账户中心</a>
        <a href="/publish">宠物发布</a>
        <a href="/pets">宠物库</a>
        <a href="/admin">审核后台</a>
      </nav>
      <div id="globalUser" class="global-user">未登录</div>
    </header>

    <main class="page-wrap">
      <section class="hero hero-landing">
        <div>
          <p class="eyebrow">Pet Homecoming System</p>
          <h1>把归家、救助、领养拆成清晰流程，而不是堆在一个页面里。</h1>
          <p class="hero-copy">系统已拆分为独立页面，分别处理账户、宠物发布、宠物库和后台审核，便于实际使用和后续扩展。</p>
        </div>
        <div class="hero-stats">
          <div class="stat-card"><span id="petCount">0</span><small>在库宠物档案</small></div>
          <div class="stat-card"><span id="pendingCount">0</span><small>待审核人员</small></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>功能入口</h2>
          <p>按业务流程访问对应页面</p>
        </div>
        <div class="feature-grid">
          <a class="feature-link" href="/auth">
            <strong>账户中心</strong>
            <span>人员注册、登录、查看审核状态</span>
          </a>
          <a class="feature-link" href="/publish">
            <strong>宠物发布</strong>
            <span>拍照、图片处理、识别、建档</span>
          </a>
          <a class="feature-link" href="/pets">
            <strong>宠物库</strong>
            <span>浏览宠物、评论、联系救治、领养、认领</span>
          </a>
          <a class="feature-link" href="/admin">
            <strong>审核后台</strong>
            <span>管理员审批注册资料</span>
          </a>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
