<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户中心 - 宠物归家系统</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="auth">
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">宠物归家系统</a>
      <nav class="site-nav">
        <a href="/">首页</a>
        <a href="/auth">账户中心</a>
        <a href="/publish">宠物发布</a>
        <a href="/pets">宠物库</a>
        <a href="/admin">审核后台</a>
      </nav>
      <div id="globalUser" class="global-user">未登录</div>
    </header>

    <main class="page-wrap">
      <section class="panel">
        <div class="panel-title">
          <h2>账户中心</h2>
          <p id="authStatus">未登录</p>
        </div>
        <div class="auth-grid">
          <form id="registerForm" class="card-form">
            <h3>人员注册</h3>
            <input name="username" placeholder="用户名" required>
            <input name="password" type="password" placeholder="密码" required>
            <input name="full_name" placeholder="姓名" required>
            <input name="phone" placeholder="电话" required>
            <input name="email" placeholder="邮箱">
            <input name="address" placeholder="地址">
            <input name="id_card" placeholder="身份证/证件号">
            <button type="submit">提交注册</button>
          </form>

          <form id="loginForm" class="card-form">
            <h3>登录</h3>
            <input name="username" placeholder="用户名" required>
            <input name="password" type="password" placeholder="密码" required>
            <button type="submit">登录系统</button>
            <button type="button" class="secondary" id="logoutBtn">退出登录</button>
            <p class="hint">默认管理员：admin / admin123</p>
          </form>
        </div>
        <div id="currentUserCard" class="info-card hidden"></div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
