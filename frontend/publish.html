<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宠物发布 - 宠物归家系统</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="publish">
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="./index.html">宠物归家系统</a>
      <nav class="site-nav">
        <a href="./index.html">首页</a>
        <a href="./auth.html">账户中心</a>
        <a href="./admin.html">审核后台</a>
      </nav>
      <a id="globalUser" class="global-user" href="./login.html">登录</a>
    </header>

    <main class="page-wrap">
      <section class="panel">
        <div class="panel-title">
          <h2>本地上传与宠物建档</h2>
          <p>发布页仅保留本地图片上传，上传后自动完成图像处理、识别分析和宠物档案填写。</p>
        </div>

        <section class="upload-stage">
          <canvas id="captureCanvas" class="hidden"></canvas>
          <input type="file" id="imageFileInput" class="hidden" accept="image/*">
          <div class="upload-actions">
            <button type="button" id="uploadButton" class="upload-button">本地上传</button>
          </div>
        </section>

        <div class="image-preview-grid">
          <div class="preview-card">
            <span>原图预览</span>
            <img id="rawPreview" alt="原图预览">
          </div>
          <div class="preview-card">
            <span>处理后预览</span>
            <img id="processedPreview" alt="处理后预览">
          </div>
          <div class="preview-card metrics">
            <span>图像分析</span>
            <pre id="visionMetrics">尚未生成分析结果</pre>
          </div>
        </div>

        <form id="petForm" class="card-form wide">
          <h3>新建宠物档案</h3>
          <div class="inline-fields">
            <input name="name" placeholder="宠物名称/代号" required>
            <select name="manual_category" id="manualCategorySelect" required>
              <option value="">人工分类</option>
              <option value="犬类">犬类</option>
              <option value="猫类">猫类</option>
              <option value="鸟类">鸟类</option>
              <option value="小型宠物">小型宠物</option>
              <option value="其他">其他</option>
            </select>
            <select name="status" required>
              <option value="">当前状态</option>
              <option value="待寻主">待寻主</option>
              <option value="需救治">需救治</option>
              <option value="待领养">待领养</option>
              <option value="已归家">已归家</option>
            </select>
          </div>
          <div class="inline-fields">
            <input name="breed" placeholder="品种">
            <input name="age_desc" placeholder="年龄描述">
            <input name="contact_phone" placeholder="联系人电话" required>
          </div>
          <input name="found_location" placeholder="发现/救助地点">
          <input name="recognition_hint" placeholder="识别提示词，例如：橘猫、蓝项圈、左耳缺口">
          <input name="adoption_status" placeholder="领养说明，例如：已绝育、可预约看宠">
          <textarea name="description" placeholder="情况描述：走失、发现时间、体貌特征等"></textarea>
          <textarea name="health_note" placeholder="健康状态：外伤、疫苗、虚弱程度、治疗建议等"></textarea>
          <button type="submit">提交宠物档案</button>
        </form>

        <div id="recognitionCard" class="info-card hidden"></div>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
